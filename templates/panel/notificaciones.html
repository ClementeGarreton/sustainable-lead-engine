{% extends "panel/base.html" %}
{% block panel_title %}Notificaciones{% endblock %}

{% block panel_content %}
<div class="divide-y divide-border rounded-2xl border border-border bg-card">
  {% for n in notifs %}
  <div class="flex items-start gap-4 p-4 {{ '' if n.read else 'bg-primary/5' }}">
    {% if n.icon == "bell" %}<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5 {{ n.c }}"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    {% elif n.icon == "check" %}<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5 {{ n.c }}"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    {% elif n.icon == "alert" %}<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5 {{ n.c }}"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    {% endif %}
    <div class="flex-1">
      <p class="font-medium">{{ n.t }}</p>
      <p class="text-sm text-muted-foreground">{{ n.d }}</p>
    </div>
    <span class="text-xs text-muted-foreground">{{ n.at }}</span>
  </div>
  {% endfor %}
</div>
{% endblock %}

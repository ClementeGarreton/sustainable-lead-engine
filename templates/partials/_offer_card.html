<a href="/oferta/{{ o.slug }}" class="offer-card">
  <div class="offer-card-img">
    <img src="{{ o.image }}" alt="{{ o.title }}" loading="lazy">
    <span class="badge badge-bg" style="position:absolute;left:0.75rem;top:0.75rem">{{ o.category_label }}</span>
    {% if o.seller %}
    <span class="badge badge-outline badge-primary" style="position:absolute;right:0.75rem;top:0.75rem">{{ o.seller_type_label }}</span>
    {% endif %}
    {% if o.featured %}
    <span class="badge badge-amber" style="position:absolute;bottom:0.75rem;left:0.75rem">Oferta destacada · Publicidad</span>
    {% endif %}
  </div>
  <div class="offer-card-body">
    <h3>{{ o.title }}</h3>
    <p>{{ o.hook }}</p>
    {% if o.seal_labels %}
    <div class="offer-card-seals">
      {% for s in o.seal_labels %}
      <span class="seal-pill">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
        {{ s }}
      </span>
      {% endfor %}
    </div>
    {% endif %}
    <div class="offer-card-meta">
      <span class="city">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        {{ o.city }}
      </span>
      <span class="price">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Ver precio
      </span>
    </div>
  </div>
</a>

{% extends "base.html" %}
{% block title %}Verifica tu correo — Mi Auto Sustentable{% endblock %}

{% block content %}
<div class="container flex flex-col items-center text-center" style="max-width:28rem;padding-block:6rem">
  <div class="modal-icon" style="margin:0">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-foreground)"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </div>
  <h1 class="font-display text-3xl font-bold mt-6">Verifica tu correo</h1>
  <p class="text-muted-foreground mt-2">Te enviamos un enlace de confirmación. Revisa también tu carpeta de spam.</p>
  <div class="flex gap-2 mt-6">
    <a href="/onboarding" class="btn btn-hero">Ya verifiqué</a>
    <button class="btn btn-outline" onclick="showToast('Correo reenviado.')">Reenviar correo</button>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Recuperar contraseña — Mi Auto Sustentable{% endblock %}

{% block content %}
<div class="container flex justify-center" style="padding-block:4rem">
  <div class="w-full space-y-6 rounded-3xl border border-border bg-card p-8 shadow-card" style="max-width:24rem">
    <div class="text-center">
      <a href="/" class="logo" style="justify-content:center">
        <span class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-foreground)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></span>
        <span class="logo-text">Mi Auto<span>.Sustentable</span></span>
      </a>
      <h1 class="font-display text-2xl font-bold mt-4">Recuperar acceso</h1>
      <p class="text-sm text-muted-foreground">Te enviaremos un enlace para restablecer tu contraseña.</p>
    </div>
    <form id="recoverForm" class="space-y-3">
      <div><label class="label">Correo</label><input class="input" type="email" required></div>
      <button type="submit" class="btn btn-hero btn-lg btn-w-full">Enviar enlace</button>
      <p class="text-center text-xs"><a href="/ingresar" class="text-muted-foreground hover:text-foreground">Volver a ingresar</a></p>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("recoverForm").addEventListener("submit", function(e) {
  e.preventDefault();
  showToast("Enlace enviado, revisa tu correo.");
});
</script>
{% endblock %}

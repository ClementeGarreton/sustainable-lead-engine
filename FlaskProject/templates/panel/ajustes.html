          <div>
            <h1 class="panel-title">Ajustes</h1>
            
          </div>
          <a href="/" class="text-xs text-muted-foreground hover:text-foreground">← Volver al sitio</a>
        </header>
        <div class="panel-body">
          
<form id="settingsForm" class="grid gap-6 rounded-2xl border border-border bg-card p-6" style="max-width:42rem">
  <section>
    <h3 class="font-display font-semibold">Cuenta</h3>
    <div class="grid gap-3 sm:grid-cols-2 mt-3">
      <div><label class="label">Correo</label><input class="input" type="email" value="hola@evplus.cl"></div>
      <div><label class="label">Teléfono</label><input class="input" value="+56 9 1111 2222"></div>
    </div>
  </section>
  <section>
    <h3 class="font-display font-semibold">Datos de facturación</h3>
    <div class="grid gap-3 sm:grid-cols-2 mt-3">
      <div><label class="label">Razón social</label><input class="input" value="EV+ Santiago SpA"></div>
      <div><label class="label">RUT</label><input class="input" value="76.123.456-7"></div>
    </div>
  </section>
  <section class="space-y-3">
    <h3 class="font-display font-semibold">Notificaciones</h3>
    
    
    <div class="flex items-center justify-between">
      <label class="label" style="margin:0">Avisarme por correo de nuevos leads</label>
      <button type="button" class="switch on" onclick="this.classList.toggle('on')"></button>
    </div>
    
    <div class="flex items-center justify-between">
      <label class="label" style="margin:0">Avisarme por WhatsApp de nuevos leads</label>
      <button type="button" class="switch " onclick="this.classList.toggle('on')"></button>
    </div>
    
    <div class="flex items-center justify-between">
      <label class="label" style="margin:0">Resumen semanal de métricas</label>
      <button type="button" class="switch on" onclick="this.classList.toggle('on')"></button>
    </div>
    
  </section>
  <button type="submit" class="btn btn-hero btn-lg">Guardar</button>
</form>

        </div>
      </div>
    </div>
  </div>
  <div id="toastContainer" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;flex-direction:column;gap:0.5rem;"></div>
  <script src="/static/scripts.js"></script>
  
<script>
document.getElementById("settingsForm").addEventListener("submit", function(e) {
  e.preventDefault();
  showToast("Ajustes guardados");
});
</script>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel — Mi Auto Sustentable</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="panel-layout">
    <div class="panel-grid">
      <!-- SIDEBAR -->
      <aside class="panel-sidebar">
        <div class="panel-sidebar-logo">
          <a href="/" class="logo">
            <span class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-foreground)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></span>
            <span class="logo-text">Mi Auto<span>.Sustentable</span></span>
          </a>
        </div>
        <nav class="panel-nav">
          
          
          <a href="/panel" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            
            Resumen
          </a>
          
          <a href="/panel/leads" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
            
            Bandeja de leads
          </a>
          
          <a href="/panel/oferta" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
            
            Mi oferta
          </a>
          
          <a href="/panel/publicar" class="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            
            Publicar
          </a>
          
          <a href="/panel/facturacion" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
            
            Facturación
          </a>
          
          <a href="/panel/notificaciones" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            
            Notificaciones
          </a>
          
          <a href="/panel/perfil" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            
            Perfil
          </a>
          
          <a href="/panel/ajustes" class="">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            
            Ajustes
          </a>
          
        </nav>
        <div class="panel-nav-footer">
          <a href="/" class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground hover:text-foreground">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
          </a>
        </div>
      </aside>

      <!-- CONTENT -->
      <div class="panel-content">
        <header class="panel-topbar">
          <div>
            <h1 class="panel-title">Publicar oferta</h1>
            <p class="panel-subtitle">Define el gancho visible y el detalle bloqueado</p>
          </div>
          <a href="/" class="text-xs text-muted-foreground hover:text-foreground">← Volver al sitio</a>
        </header>
        <div class="panel-body">
          
<form id="publishForm" class="grid gap-5 rounded-2xl border border-border bg-card p-6" style="max-width:48rem">
  <div><label class="label">Título</label><input class="input" required placeholder="Ej: SUV eléctrico 2024 con autonomía extendida" maxlength="120"></div>
  <div>
    <label class="label">Imagen</label>
    <div class="mt-1 flex items-center justify-center rounded-xl border border-dashed border-border bg-background/40 text-muted-foreground hover:border-primary/50" style="aspect-ratio:16/8;cursor:pointer">
      <div class="text-center">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        <p class="text-sm mt-2">Sube o arrastra una imagen</p>
      </div>
    </div>
  </div>
  <div><label class="label">Dato de gancho visible</label><textarea class="textarea" required rows="2" placeholder="Lo que verán antes del muro de captura" maxlength="160"></textarea></div>
  <div><label class="label">Contenido oculto (precio, contacto, detalle)</label><textarea class="textarea" required rows="4" placeholder="Lo que se desbloquea al entregar el contacto"></textarea></div>
  <div class="grid gap-3 sm:grid-cols-2">
    <div>
      <label class="label">Categoría</label>
      <select class="select-input mt-1 w-full" required>
        <option value="autos-electricos">Autos eléctricos</option><option value="autos-hibridos">Autos híbridos</option><option value="mantenimiento">Mantenimiento EV</option><option value="conversion">Conversión a híbrido</option><option value="accesorios">Cargadores y accesorios</option><option value="medico-bateria">Médico de batería</option><option value="instalacion-domiciliaria">Instalación domiciliaria</option>
      </select>
    </div>
    <div><label class="label">Precio (CLP)</label><input class="input" required type="number" min="0" step="10000"></div>
  </div>
  <button type="submit" class="btn btn-hero btn-lg">Publicar</button>
</form>

        </div>
      </div>
    </div>
  </div>
  <div id="toastContainer" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;flex-direction:column;gap:0.5rem;"></div>
  <script src="/static/scripts.js"></script>
  
<script>
document.getElementById("publishForm").addEventListener("submit", function(e) {
  e.preventDefault();
  showToast("Oferta publicada");
  setTimeout(function() { window.location.href = "/panel/oferta"; }, 800);
});
</script>

</body>
</html>
